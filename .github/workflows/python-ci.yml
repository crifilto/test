name: Python Consolidated CI

on:
  push:
    branches: ["main", "develop", "feature/*"]
  pull_request:
    branches: ["main", "develop"]
  schedule:
    - cron: "30 1 * * 1" # Para que CodeQL siga escaneando semanalmente

env:
  MIN_COVERAGE: 80 # Porcentaje de cobertura mínimo parametrizado

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Syntax check (Compile)
        run: python -m compileall src/

  lint:
    needs: syntax-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install flake8
        run: pip install flake8
      - name: Lint with flake8 (PEP8)
        run: |
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  security:
    needs: lint
    name: Security Scan (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  test-and-coverage:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
      - name: Test with pytest and collect coverage
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest --cov=src --cov-report=xml --cov-report=term-missing tests/
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-reports
          path: coverage.xml

  coverage-gate:
    needs: test-and-coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-coverage-reports
      - name: Check Coverage Percentage
        run: |
          # Extraer el porcentaje de cobertura total del XML generado por pytest-cov
          COVERAGE=$(grep -oP 'line-rate="\K[^"]+' coverage.xml | head -1)
          COVERAGE_PCT=$(echo "$COVERAGE * 100" | bc | cut -d. -f1)

          echo "Cobertura actual: $COVERAGE_PCT%"
          echo "Cobertura mínima requerida: $MIN_COVERAGE%"

          if [ "$COVERAGE_PCT" -lt "$MIN_COVERAGE" ]; then
            echo "::error::La cobertura ($COVERAGE_PCT%) es inferior al mínimo requerido ($MIN_COVERAGE%)"
            exit 1
          fi
          echo "¡Umbral de cobertura superado!"
